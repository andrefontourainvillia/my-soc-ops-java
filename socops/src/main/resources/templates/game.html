<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Soc Ops — Social Bingo</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}"/>
    <style>
        /* ── Lobby background (dot grid + ambient glow) ──────────── */
        .lobby-bg {
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(0,255,136,0.04) 0%, transparent 55%),
                radial-gradient(circle, rgba(0,255,136,0.055) 1px, transparent 1px);
            background-size: 100% 100%, 28px 28px;
        }

        /* ── Brand section ───────────────────────────────────────── */
        .lobby-brand { margin-bottom: 2.5rem; }

        .lobby-eyebrow {
            font-size: 0.6rem;
            letter-spacing: 0.38em;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 0.6rem;
        }

        .lobby-title {
            font-family: var(--font-brand);
            font-size: 3.8rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--text-1);
            line-height: 1;
            margin-bottom: 0.65rem;
            text-shadow: 0 0 60px rgba(0,255,136,0.1);
        }

        .lobby-accent-line {
            width: 2.75rem;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            margin: 0 auto 0.75rem;
            border-radius: 2px;
        }

        .lobby-subtitle {
            font-size: 0.65rem;
            letter-spacing: 0.44em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 600;
            opacity: 0.75;
        }

        /* ── How-to card ─────────────────────────────────────────── */
        .how-to-card {
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-left: 3px solid rgba(0,255,136,0.45);
            border-radius: 0.5rem;
            padding: 1.25rem 1.5rem;
            text-align: left;
            margin-bottom: 1.5rem;
        }

        .how-to-card__title {
            font-family: var(--font-brand);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            font-weight: 700;
            opacity: 0.7;
            margin-bottom: 0.9rem;
        }

        .how-to-card__list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .how-to-card__list li {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            font-size: 0.82rem;
            color: var(--text-2);
            line-height: 1.45;
        }

        .how-to-card__num {
            font-family: var(--font-brand);
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--accent);
            opacity: 0.65;
            min-width: 1.4rem;
            padding-top: 0.12rem;
        }

        /* ── Primary action button ───────────────────────────────── */
        .start-btn {
            display: block;
            width: 100%;
            padding: 0.875rem 2rem;
            font-family: var(--font-brand);
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            color: var(--accent);
            background: transparent;
            border: 1px solid rgba(0,255,136,0.32);
            border-radius: 0.375rem;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
        }

        .start-btn:hover {
            background: rgba(0,255,136,0.07);
            border-color: rgba(0,255,136,0.65);
            box-shadow: 0 0 28px rgba(0,255,136,0.1);
        }

        .start-btn:active {
            transform: scale(0.98);
            background: rgba(0,255,136,0.11);
        }

        /* ── Game header ─────────────────────────────────────────── */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1rem;
            background: var(--bg-2);
            border-bottom: 1px solid rgba(0,255,136,0.16);
        }

        .game-header__title {
            font-family: var(--font-brand);
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.24em;
            color: var(--text-1);
        }

        .back-btn {
            font-family: var(--font-brand);
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-2);
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--border);
            padding: 0.35rem 0.7rem;
            border-radius: 0.25rem;
            transition: color 0.15s ease, border-color 0.15s ease;
            min-width: 4rem;
        }

        .back-btn:hover {
            color: var(--text-1);
            border-color: rgba(0,255,136,0.3);
        }

        /* ── Game hint ───────────────────────────────────────────── */
        .game-hint {
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            color: var(--text-3);
            text-align: center;
            padding: 0.45rem 1rem;
            text-transform: uppercase;
        }

        /* ── Bingo banner ────────────────────────────────────────── */
        .bingo-banner {
            font-family: var(--font-brand);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.24em;
            text-transform: uppercase;
            text-align: center;
            padding: 0.5rem 1rem;
            color: var(--gold);
            background: rgba(255,200,50,0.05);
            border-bottom: 1px solid rgba(255,200,50,0.18);
        }

        /* ── Grid tiles ──────────────────────────────────────────── */
        .tile {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.25rem;
            text-align: center;
            border-radius: 0.25rem;
            border-style: solid;
            border-width: 1px;
            min-height: 60px;
            font-size: 0.65rem;
            line-height: 1.25;
            word-break: break-word;
            hyphens: auto;
            user-select: none;
            cursor: pointer;
            transition: background 0.15s ease, border-color 0.15s ease,
                        box-shadow 0.15s ease, transform 0.1s ease;
        }

        .tile-enter {
            animation: fadeInUp 0.35s ease both;
        }

        .tile-idle {
            background: var(--bg-2);
            border-color: var(--border);
            color: var(--text-2);
        }

        .tile-idle:hover {
            background: var(--bg-3);
            border-color: rgba(0,255,136,0.2);
            color: var(--text-1);
        }

        .tile-idle:active { transform: scale(0.95); }

        .tile-marked {
            background: rgba(0,255,136,0.06);
            border-color: rgba(0,255,136,0.4);
            color: var(--text-1);
            box-shadow: 0 0 14px rgba(0,255,136,0.08),
                        inset 0 0 10px rgba(0,255,136,0.04);
            animation: tileSelect 0.22s ease both;
        }

        .tile-winner {
            background: rgba(255,200,50,0.09);
            border-color: rgba(255,200,50,0.52);
            color: var(--gold);
            box-shadow: 0 0 18px rgba(255,200,50,0.16),
                        inset 0 0 10px rgba(255,200,50,0.06);
            animation: tileSelect 0.22s ease both;
        }

        .tile-free {
            background: rgba(0,255,136,0.04);
            border-color: rgba(0,255,136,0.2);
            color: rgba(0,255,136,0.5);
            font-size: 0.72rem;
            font-weight: 700;
            cursor: default;
        }

        .tile__tick {
            position: absolute;
            top: 0.15rem;
            right: 0.2rem;
            font-size: 0.58rem;
            color: var(--accent);
            opacity: 0.6;
            line-height: 1;
        }

        /* ── Victory overlay ─────────────────────────────────────── */
        .victory-backdrop {
            background: rgba(2, 3, 8, 0.82);
            backdrop-filter: blur(6px);
        }

        .victory-card {
            background: var(--bg-3);
            border: 1px solid rgba(0,255,136,0.18);
            border-top: 2px solid var(--accent);
            border-radius: 0.75rem;
            padding: 2.25rem 1.75rem;
            max-width: 20rem;
            width: 100%;
            box-shadow: 0 0 70px rgba(0,255,136,0.07);
            animation: fadeInUp 0.35s ease both;
        }

        .victory-glyph {
            font-size: 2.25rem;
            margin-bottom: 0.75rem;
            filter: drop-shadow(0 0 10px rgba(255,200,50,0.5));
        }

        .victory-title {
            font-family: var(--font-brand);
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 0.5rem;
            animation: victoryPulse 2s ease-in-out infinite;
        }

        .victory-subtitle {
            font-size: 0.68rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-2);
            margin-bottom: 1.75rem;
        }
    </style>
</head>
<body class="h-full">

<!-- ============================================================= -->
<!--  LOBBY — visible before a game starts                          -->
<!-- ============================================================= -->
<div id="lobbyView" class="flex flex-col items-center justify-center min-h-full p-6 bg-dark lobby-bg">
    <div class="text-center max-w-sm">

        <div class="lobby-brand anim-fade-up">
            <p class="lobby-eyebrow">Welcome to</p>
            <h1 class="lobby-title">SOC OPS</h1>
            <div class="lobby-accent-line"></div>
            <p class="lobby-subtitle">Social Bingo</p>
        </div>

        <div class="how-to-card anim-fade-up anim-delay-2">
            <p class="how-to-card__title">How to play</p>
            <ol class="how-to-card__list">
                <li><span class="how-to-card__num">01</span><span>Find people who match the questions</span></li>
                <li><span class="how-to-card__num">02</span><span>Tap a square when you find a match</span></li>
                <li><span class="how-to-card__num">03</span><span>Get 5 in a row to win!</span></li>
            </ol>
        </div>

        <button onclick="launchGame()" class="start-btn anim-fade-up anim-delay-3">
            Start Game
        </button>

    </div>
</div>

<!-- ============================================================= -->
<!--  ACTIVE GAME — board, header, optional bingo banner            -->
<!-- ============================================================= -->
<div id="activeView" class="flex flex-col min-h-full bg-dark" style="display:none">

    <!-- top bar -->
    <header class="game-header">
        <button onclick="retreatToLobby()" class="back-btn">&#8592; Back</button>
        <h1 class="game-header__title">SOC OPS</h1>
        <div class="w-16"></div>
    </header>

    <!-- hint -->
    <p class="game-hint">Tap a square when you find someone who matches it</p>

    <!-- bingo banner (hidden until victory) -->
    <div id="bingoBanner" class="bingo-banner" style="display:none">
        &#9733; BINGO — Line Complete!
    </div>

    <!-- the 5×5 grid -->
    <div class="flex-1 flex items-center justify-center p-3">
        <div id="gridContainer"
             class="grid grid-cols-5 gap-1 w-full max-w-md mx-auto aspect-square">
            <!-- tiles injected by JS -->
        </div>
    </div>
</div>

<!-- ============================================================= -->
<!--  VICTORY MODAL — overlays the board                            -->
<!-- ============================================================= -->
<div id="victoryOverlay"
     class="victory-backdrop fixed inset-0 flex items-center justify-center p-4 z-50"
     style="display:none">
    <div class="victory-card text-center">
        <div class="victory-glyph">&#9733;</div>
        <h2 class="victory-title">BINGO!</h2>
        <p class="victory-subtitle">Line Completed</p>
        <button onclick="dismissVictoryModal()" class="start-btn">
            Keep Playing
        </button>
    </div>
</div>

<!-- ============================================================= -->
<!--  Client-side game engine                                       -->
<!-- ============================================================= -->
<script>
(function () {
    "use strict";

    var SIDE = 5;
    var TOTAL_CELLS = SIDE * SIDE;
    var PERSIST_KEY = "socops-bingo-snapshot";

    /* ── state ────────────────────────────────────────────────── */
    var liveTiles    = [];          /* Array of BingoCell objects  */
    var streakFound  = null;        /* WinningStreak or null       */
    var modalShown   = false;
    var currentPhase = "LOBBY";     /* LOBBY | ACTIVE | VICTORY    */
    var isFirstRender = true;       /* drives tile entrance animation */

    /* ── DOM refs ─────────────────────────────────────────────── */
    var lobbyDiv   = document.getElementById("lobbyView");
    var activeDiv  = document.getElementById("activeView");
    var gridDiv    = document.getElementById("gridContainer");
    var bannerDiv  = document.getElementById("bingoBanner");
    var overlayDiv = document.getElementById("victoryOverlay");

    /* ── phase switching ──────────────────────────────────────── */
    function showPhase(phase) {
        currentPhase = phase;
        lobbyDiv.style.display   = (phase === "LOBBY") ? "" : "none";
        activeDiv.style.display  = (phase !== "LOBBY") ? "" : "none";
        bannerDiv.style.display  = (streakFound)       ? "" : "none";
        overlayDiv.style.display = (modalShown)        ? "" : "none";
    }

    /* ── board rendering ──────────────────────────────────────── */
    function paintGrid() {
        gridDiv.innerHTML = "";
        var winIds = streakFound ? gatherStreakIds(streakFound) : {};
        var firstRender = isFirstRender;
        isFirstRender = false;

        for (var t = 0; t < liveTiles.length; t++) {
            var tile = liveTiles[t];
            var btn = document.createElement("button");

            var stateClass;
            if (tile.freeCell) {
                stateClass = "tile-free";
            } else if (tile.selected) {
                stateClass = winIds[tile.id] ? "tile-winner" : "tile-marked";
            } else {
                stateClass = "tile-idle";
            }

            btn.className = "tile " + stateClass + (firstRender ? " tile-enter" : "");
            if (firstRender) {
                btn.style.animationDelay = (t * 0.018) + "s";
            }

            if (tile.freeCell) { btn.disabled = true; }
            btn.setAttribute("aria-pressed", String(tile.selected));
            btn.setAttribute("aria-label", tile.freeCell ? "Free space" : tile.prompt);

            var labelSpan = document.createElement("span");
            labelSpan.textContent = tile.prompt;
            btn.appendChild(labelSpan);

            if (tile.selected && !tile.freeCell) {
                var tick = document.createElement("span");
                tick.className = "tile__tick";
                tick.textContent = "\u2713";
                btn.appendChild(tick);
            }

            btn.addEventListener("click", (function (cid) {
                return function () { onTileTapped(cid); };
            })(tile.id));

            gridDiv.appendChild(btn);
        }
    }

    /* ── tile tap logic ───────────────────────────────────────── */
    function onTileTapped(cellId) {
        liveTiles = flipTile(liveTiles, cellId);

        if (!streakFound) {
            var detected = scanForStreak(liveTiles);
            if (detected) {
                streakFound = detected;
                currentPhase = "VICTORY";
                modalShown = true;
            }
        }
        persistSnapshot();
        paintGrid();
        bannerDiv.style.display  = streakFound ? "" : "none";
        overlayDiv.style.display = modalShown  ? "" : "none";
    }

    /* ── board manipulation (mirrors BoardAssembler.java) ─────── */
    function flipTile(board, cellId) {
        return board.map(function (c) {
            if (c.id === cellId && !c.freeCell) {
                return { id: c.id, prompt: c.prompt, selected: !c.selected, freeCell: false };
            }
            return c;
        });
    }

    /* ── victory scanning (mirrors detectWinningStreak) ───────── */
    function scanForStreak(board) {
        var r, c, positions, i;

        /* rows */
        for (r = 0; r < SIDE; r++) {
            positions = [];
            for (c = 0; c < SIDE; c++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "row", index: r, cellPositions: positions };
            }
        }

        /* columns */
        for (c = 0; c < SIDE; c++) {
            positions = [];
            for (r = 0; r < SIDE; r++) { positions.push(r * SIDE + c); }
            if (lineComplete(board, positions)) {
                return { direction: "column", index: c, cellPositions: positions };
            }
        }

        /* main diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + i); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 0, cellPositions: positions };
        }

        /* anti diagonal */
        positions = [];
        for (i = 0; i < SIDE; i++) { positions.push(i * SIDE + (SIDE - 1 - i)); }
        if (lineComplete(board, positions)) {
            return { direction: "diagonal", index: 1, cellPositions: positions };
        }

        return null;
    }

    function lineComplete(board, positions) {
        for (var k = 0; k < positions.length; k++) {
            if (!board[positions[k]].selected) { return false; }
        }
        return true;
    }

    function gatherStreakIds(streak) {
        var lookup = {};
        for (var j = 0; j < streak.cellPositions.length; j++) {
            lookup[streak.cellPositions[j]] = true;
        }
        return lookup;
    }

    /* ── localStorage persistence ─────────────────────────────── */
    function persistSnapshot() {
        try {
            var blob = JSON.stringify({
                phase: currentPhase,
                tiles: liveTiles,
                streak: streakFound,
                modal: modalShown
            });
            localStorage.setItem(PERSIST_KEY, blob);
        } catch (_) { /* storage full or unavailable */ }
    }

    function restoreSnapshot() {
        try {
            var raw = localStorage.getItem(PERSIST_KEY);
            if (!raw) { return false; }
            var snap = JSON.parse(raw);
            if (!snap.tiles || snap.tiles.length !== TOTAL_CELLS) { return false; }
            liveTiles   = snap.tiles;
            streakFound = snap.streak || null;
            modalShown  = !!snap.modal;
            currentPhase = snap.phase || "ACTIVE";
            return currentPhase !== "LOBBY";
        } catch (_) { return false; }
    }

    /* ── public API (called from onclick attrs) ───────────────── */
    window.launchGame = function () {
        fetch("/api/bingo/fresh-board")
            .then(function (resp) { return resp.json(); })
            .then(function (cells) {
                liveTiles    = cells;
                streakFound  = null;
                modalShown   = false;
                currentPhase = "ACTIVE";
                isFirstRender = true;
                persistSnapshot();
                paintGrid();
                showPhase("ACTIVE");
            });
    };

    window.retreatToLobby = function () {
        liveTiles   = [];
        streakFound = null;
        modalShown  = false;
        currentPhase = "LOBBY";
        persistSnapshot();
        showPhase("LOBBY");
    };

    window.dismissVictoryModal = function () {
        modalShown = false;
        overlayDiv.style.display = "none";
        persistSnapshot();
    };

    /* ── boot ─────────────────────────────────────────────────── */
    if (restoreSnapshot()) {
        paintGrid();
        showPhase(currentPhase);
    } else {
        showPhase("LOBBY");
    }
})();
</script>

</body>
</html>
